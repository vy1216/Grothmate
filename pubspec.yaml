name: growthmate
description: Your personal AI-powered health & wellness companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Database — sqflite works on Android/iOS, sqflite_common_ffi_web on web
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.0
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3

  # HTTP for Groq API
  http: ^1.2.1

  # UI
  percent_indicator: ^4.2.4
  fl_chart: ^0.67.0
  google_fonts: ^6.2.1

  # Image picker
  image_picker: ^1.0.7

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
